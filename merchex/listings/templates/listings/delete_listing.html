{% extends 'listings/base.html' %}
{% block content %}

<p>Etes-vous sûre de vouloir supprimer l'annonce : {{ listing.title }} ?</p>

<form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Supprimer">
</form>

<form action="{% url 'listing-detail' listing.id %}" >
    <input type="submit" value="Retour">
</form>

{% endblock %}
